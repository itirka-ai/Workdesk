<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Gracefully capture and suppress WebSocket HMR connection warnings to prevent development overlays from breaking the preview
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        if (
          reason === 'WebSocket closed without opened.' ||
          (reason && typeof reason === 'string' && (reason.indexOf('WebSocket') !== -1 || reason.indexOf('websocket') !== -1)) ||
          (reason && reason.message && (
            reason.message.indexOf('WebSocket') !== -1 || 
            reason.message.indexOf('websocket') !== -1 ||
            reason.message.indexOf('failed to connect') !== -1
          ))
        ) {
          event.preventDefault();
          event.stopPropagation();
        }
      });

      window.addEventListener('error', function(event) {
        var msg = event.message;
        if (
          msg === 'WebSocket closed without opened.' ||
          (msg && (
            msg.indexOf('WebSocket') !== -1 ||
            msg.indexOf('websocket') !== -1 ||
            msg.indexOf('failed to connect') !== -1
          ))
        ) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
